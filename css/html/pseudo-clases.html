<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplos de pseudo-clases</title>
    <style>
        a:link {
            color: green;
        }

        a:visited {
            color: red;
        }

        a:hover {
            font-size: 18px;
        }
        a:active {
            color: black;
        }
        button:hover{
            color: red;
        }
        button:active{
            color: blue;
        }
    </style>
</head>

<body>
    <h1>pseudo-clases CSS</h1>
    <h2>pseudo-clases orientadas a objetos</h2>
    <a href="#">Este es un enlace</a>
    <br><br>
    <button>Pulsa aqui</button>
</body>

</html>
